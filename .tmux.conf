# Force all tmux panes to launch zsh
set -g default-shell /usr/bin/zsh
set -g default-command /usr/bin/zsh

# --------------------------
# TPM Plugin Manager
# --------------------------
set -g @plugin "tmux-plugins/tpm"

# --------------------------
# Installed Plugins
# --------------------------
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "rose-pine/tmux"

# --------------------------
# Basic Settings
# --------------------------
# Set window and pane index start from 1 instead of 0
set -g base-index 1
set -g pane-base-index 1

# Place status bar at the top
set-option -g status-position top
set-option -g focus-events on

# Disable key repeat timeout
set-option -g repeat-time 0

# Remove escape key delay
set -sg escape-time 0

# Enable mouse interaction
set -g mouse on

# Auto re-number windows after closing
set -g renumber-windows on

# --------------------------
# Status Bar Bottom Divider (Guaranteed to work)
# --------------------------
# Show pane border at the top (creates a full-width divider line)
setw -g pane-border-status top
# No text on the pane border, only a line
setw -g pane-border-format ""
# Use single line for the border
setw -g pane-border-lines single
# Inactive pane border color (matching rose-pine moon)
setw -g pane-border-style fg="#575268"
# Active pane border color (matching rose-pine moon)
setw -g pane-active-border-style fg="#c4a7e7"

# --------------------------
# Terminal & Color Support
# --------------------------
set -g default-terminal "screen-256color"
set -ga terminal-overrides ',*:RGB'
set -ga terminal-overrides ',*:Tc'

# --------------------------
# Prefix Key: Use Ctrl + a
# --------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --------------------------
# Rose Pine Moon Theme Config
# --------------------------
set -g @rose_pine_variant 'moon'
set -g @rose_pine_host 'on'
set -g @rose_pine_date_time ''
set -g @rose_pine_user 'on'
set -g @rose_pine_directory 'on'

# Transparent status bar background for terminal with transparency
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'

set -g @rose_pine_default_window_behavior 'on'
set -g @rose_pine_show_current_program 'on'
set -g @rose_pine_show_pane_directory 'on'

set -g @rose_pine_left_separator ' > '
set -g @rose_pine_right_separator ' <- '
set -g @rose_pine_field_separator ' | '
set -g @rose_pine_window_separator ' - '

set -g @rose_pine_session_icon ''
set -g @rose_pine_current_window_icon ''
set -g @rose_pine_hostname_icon '󰒋'
set -g @rose_pine_date_time_icon '󰃰'
set -g @rose_pine_window_status_separator "  "

set -g @rose_pine_prioritize_windows ''
set -g @rose_pine_width_to_hide '80'
set -g @rose_pine_window_count '5'

# --------------------------
# Pane Split Keybindings
# --------------------------
unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

# --------------------------
# Reload Configuration
# --------------------------
unbind r
bind r source-file ~/.tmux.conf

# --------------------------
# Pane Resize Keybindings
# --------------------------
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Toggle pane zoom
bind -r m resize-pane -Z

# --------------------------
# Vi Style Copy Mode
# --------------------------
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

unbind -T copy-mode-vi MouseDragEnd1Pane

# --------------------------
# Yazi Terminal Passthrough
# --------------------------
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g update-environment "TERM TERM_PROGRAM TERM_PROGRAM_VERSION"
set -g terminal-features ',xterm-256color:sixel'
set -g aggressive-resize off

# --------------------------
# Initialize TPM (Must be last line)
# --------------------------
run "~/.tmux/plugins/tpm/tpm"
